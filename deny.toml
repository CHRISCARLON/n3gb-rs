# https://embarkstudios.github.io/cargo-deny/cli/init.html

[graph]
all-features = true

[advisories]
# Accepted advisories: all are transitive deps with no safe upgrade available.
# Vulnerabilities are still denied by default — these are unmaintained/unsound only.
ignore = [
    "RUSTSEC-2024-0436", # paste unmaintained — via parquet, no replacement available
    "RUSTSEC-2023-0089", # atomic-polyfill unmaintained — via heapless/rstar/geo-types
    "RUSTSEC-2026-0097", # rand unsound — only affects custom-logger + rand::rng(), unused here
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "BlueOak-1.0.0", # lonlat_bng (OSTN15 backend), ostn15_phf
]
exceptions = [
    { allow = ["Unicode-3.0"], crate = "unicode-ident" },
    { allow = ["MPL-2.0"], crate = "cbindgen" }, # build-only dep of proj-sys
]

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
